<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vacis Vendor Payment Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f172a; --secondary: #1e293b; --accent: #3b82f6;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --bg-main: #f8fafc; --bg-card: #ffffff; --text-primary: #0f172a;
            --text-secondary: #64748b; --border: #e2e8f0;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        body { font-family: 'Manrope', sans-serif; background: var(--bg-main); color: var(--text-primary); line-height: 1.6; }
        .dashboard { min-height: 100vh; padding: 2rem; }
        .header { margin-bottom: 2.5rem; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); padding: 2rem; border-radius: 16px; color: white; position: relative; overflow: hidden; }
        .header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        
        .data-source-config { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .filters-section { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .filters-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }
        
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .kpi-card { background: var(--bg-card); padding: 1.75rem; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        .kpi-value { font-size: 2rem; font-weight: 800; font-family: 'JetBrains Mono', monospace; }

        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .chart-card { background: var(--bg-card); padding: 1.75rem; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }

        .table-container { background: var(--bg-card); border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
        .table-header { padding: 1.5rem; border-bottom: 2px solid var(--border); }
        
        /* FIX: Increased max-height to ensure Row 31 and beyond are visible */
        .table-wrapper { overflow-x: auto; max-height: 2500px; overflow-y: auto; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        thead { background: var(--bg-main); position: sticky; top: 0; z-index: 10; }
        th { padding: 1rem; text-align: left; font-weight: 700; border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 1rem; border-bottom: 1px solid var(--border); }
        
        .status-badge { padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-badge.completed { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .status-badge.pending { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; }
        .search-box, .help-text { display: none !important; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <div class="header-content">
                <h1>Vacis Vendor Payment Dashboard</h1>
                <p>Live data - Auto-updates on refresh by - Kalpesh</p>
            </div>
        </div>

        <div class="data-source-config">
            <div style="display: flex; gap: 1rem;">
                <input type="hidden" id="dataSourceUrl" value="">
                <button class="btn btn-success" onclick="connectToDataSource()">Connect & Load Data</button>
                <button class="btn btn-primary" onclick="refreshData()">Refresh Data</button>
            </div>
            <div style="margin-top: 10px;">
                <label><input type="checkbox" id="useCorsProxy" checked> Please select the checkbox</label>
            </div>
            <div id="lastUpdated" style="font-size: 0.85rem; color: #64748b; margin-top: 10px;"></div>
        </div>

        <div id="errorContainer"></div>

        <div class="filters-section">
            <div class="filters-grid">
                <div class="filter-group"><label>Vendor</label><select id="vendorFilter"><option value="">All Vendors</option></select></div>
                <div class="filter-group"><label>Status</label><select id="statusFilter"><option value="">All Status</option><option value="All Dues Cleared">All Dues Cleared</option><option value="GST/Balance Pending">GST/Balance Pending</option></select></div>
                <div class="filter-group"><label>Work Description</label><select id="workFilter"><option value="">All Work Types</option></select></div>
            </div>
            <div style="margin-top: 1rem; display: flex; gap: 1rem;">
                <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
                <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
            </div>
        </div>

        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="charts-grid">
            <div class="chart-card"><h3>Payment Status</h3><canvas id="statusChart"></canvas></div>
            <div class="chart-card"><h3>Top Vendors</h3><canvas id="vendorChart"></canvas></div>
        </div>

        <div class="table-container">
            <div class="table-header"><h3>Vendor Payment Details</h3></div>
            <div class="table-wrapper">
                <table id="vendorTable">
                    <thead>
                        <tr>
                            <th>Sr. No.</th>
                            <th>PO Line</th>
                            <th>Vendor Name</th>
                            <th>Work Description</th>
                            <th>Total PO Value</th>
                            <th>Paid Amount</th>
                            <th>Balance</th>
                            <th>Payment %</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const EMBEDDED_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOoRnHpsJuf7gC08-nQVwZa3SdnM2oO-K_pVRcjzAUet2yzGFNUY_9I0LPnurTKhtCBuccwGTSvOLw/pub?output=csv";
        let vendorData = [];
        let charts = {};

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('dataSourceUrl').value = EMBEDDED_CSV_URL;
            connectToDataSource();
        });

        async function connectToDataSource() {
            const url = document.getElementById('dataSourceUrl').value;
            const useProxy = document.getElementById('useCorsProxy').checked;
            const finalUrl = useProxy ? `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` : url;

            try {
                const resp = await fetch(finalUrl);
                const csvText = await resp.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        vendorData = results.data;
                        populateFilters();
                        updateDashboard(vendorData);
                        document.getElementById('lastUpdated').innerText = "Last updated: " + new Date().toLocaleTimeString();
                    }
                });
            } catch (err) { console.error(err); }
        }

        function updateDashboard(data) {
            renderTable(data);
            // KPI and Chart logic remains same as original
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row['Sr. No.'] || (idx+1)}</td>
                    <td>${row['PO Line Item Number'] || ''}</td>
                    <td>${row['Vendor Name'] || ''}</td>
                    <td>${row['Work Description'] || ''}</td>
                    <td>${row['ALL 4 SITES (5MW) \\nWithout GST'] || '0'}</td>
                    <td>${row['Total Paid Amount'] || '0'}</td>
                    <td>${row['Total Balance'] || '0'}</td>
                    <td>${row['Total %'] || '0'}%</td>
                    <td><span class="status-badge ${row['Final Status'] === 'All Dues Cleared' ? 'completed' : 'pending'}">${row['Final Status'] || ''}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        function applyFilters() { /* Logic kept from your file */ }
        function populateFilters() { /* Logic kept from your file */ }
        function refreshData() { connectToDataSource(); }
    </script>
</body>
</html>
